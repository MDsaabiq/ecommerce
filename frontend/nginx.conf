server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router — any unknown path serves index.html
    # Without this, refreshing /products or /cart returns 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward /api/* to backend — used when running without Kubernetes Ingress
    # In Kubernetes, Ingress handles this routing instead
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
